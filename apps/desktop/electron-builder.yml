appId: com.pseudico.localworkos
productName: Local Work OS
copyright: Copyright 2026 Pseudico

directories:
  output: dist-packaged
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!dist/**/*.map"

extraMetadata:
  main: dist/main/index.js

asar: true
asarUnpack:
  - "**/*.node"

npmRebuild: true
publish: null

win:
  signAndEditExecutable: false
  target:
    - target: dir

mac:
  target:
    - target: dir

linux:
  target:
    - target: dir
